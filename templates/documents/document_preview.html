{% extends 'base.html' %}

{% block title %}Preview {{ document.title }} - Smart DMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Preview: {{ document.title }}</h2>
    <div>
        <a href="{% url 'documents:document_detail' document.pk %}" class="btn btn-outline-secondary">Back to Document</a>
        <a href="{% url 'documents:document_download' document.pk %}" class="btn btn-success">Download</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <iframe src="{{ document.file.url }}" width="100%" height="800px" style="border: none;"></iframe>
    </div>
</div>
{% endblock %}
