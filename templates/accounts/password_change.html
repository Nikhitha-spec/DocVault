{% extends 'base.html' %}

{% block title %}Change Password - Smart DMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Change Password</h2>
    <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Back to Profile</a>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Change Your Password</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_old_password" class="form-label">Old Password</label>
                        {{ form.old_password }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_new_password1" class="form-label">New Password</label>
                        {{ form.new_password1 }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_new_password2" class="form-label">Confirm New Password</label>
                        {{ form.new_password2 }}
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
